41" y="982.55">      the bowl.</text><path d="M33.60546875,1026.5146875 L67.2109375,1026.5146875 Z" stroke="#3b4261"/><path d="M33.60546875,1026.5146875 L151.224609375,1026.5146875 Z" stroke="#ADFF2F"/><text x="33.61" y="1024.55" font-weight="bold" fill="#9ece6a">4. Add carrots</text><path d="M50.408203125,1047.5146875 L100.81640625,1047.5146875 Z" stroke="#3b4261"/><path d="M50.408203125,1047.5146875 L168.02734375,1047.5146875 Z" stroke="#FFFF00"/><text x="50.41" y="1045.55" font-weight="bold" fill="#e0af68">[Scale: 150 g]</text><path d="M50.408203125,1068.5146875 L672.109375,1068.5146875 Z" stroke="#3b4261"/><text x="50.41" y="1066.55">      Peel/trim carrots (yields approx. 150 g). Add 150 g prepared carrots</text><path d="M50.408203125,1089.5146875 L201.6328125,1089.5146875 Z" stroke="#3b4261"/><text x="50.41" y="1087.55">      to the bowl.</text><path d="M33.60546875,1131.5146875 L67.2109375,1131.5146875 Z" stroke="#3b4261"/><path d="M33.60546875,1131.5146875 L142.8232421875,1131.5146875 Z" stroke="#ADFF2F"/><text x="33.61" y="1129.55" font-weight="bold" fill="#9ece6a">5. Add celery</text><path d="M50.408203125,1152.5146875 L100.81640625,1152.5146875 Z" stroke="#3b4261"/><path d="M50.408203125,1152.5146875 L168.02734375,1152.5146875 Z" stroke="#FFFF00"/><text x="50.41" y="1150.55" font-weight="bold" fill="#e0af68">[Scale: 100 g]</text><path d="M50.408203125,1173.5146875 L680.5107421875,1173.5146875 Z" stroke="#3b4261"/><text x="50.41" y="1171.55">      Peel/trim celery (yields approx. 100 g). Add 100 g prepared celery to</text><path d="M50.408203125,1194.5146875 L176.4287109375,1194.5146875 Z" stroke="#3b4261"/><text x="50.41" y="1192.55">      the bowl.</text><path d="M33.60546875,1257.5146875 L67.2109375,1257.5146875 Z" stroke="#3b4261"/><path d="M50.408203125,1257.5146875 L369.66015625,1257.5146875 Z" stroke="#3b4261"/><text x="50.41" y="1255.55">  &#xB7;  &#xB7;  &#xB7;  (and 18 more cooking steps)</text></g></svg>