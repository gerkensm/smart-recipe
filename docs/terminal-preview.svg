<svg xml:space="preserve" xmlns="http://www.w3.org/2000/svg" viewBox="-20, -16, 540, 1421.45" font-family='SFMono-Regular, Menlo, Consolas, "Courier New", monospace' font-size="14"><g fill="#a9b1d6"><rect x="-20" y="-16" width="540" height="1421.45" fill="#1a1b26"/><text x="16.8" y="37.55" fill="#565f89">&#x250C;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2510;</text><text x="16.8" y="58.55" fill="#565f89">&#x2502;  </text><text x="42.01" y="58.55" font-weight="bold" fill="#bb9af7">Tuscan Duck Rag&#xF9; with Pici</text><text x="277.25" y="58.55" fill="#565f89">&#x2502;</text><text x="16.8" y="79.55" fill="#565f89">&#x2514;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2518;</text><text x="16.8" y="100.55" font-style="italic" fill="#565f89">A rich Tuscan-style duck rag&#xF9; with tender pieces</text><text x="16.8" y="121.55" font-style="italic" fill="#565f89">of duck breast, aromatic vegetables, red wine,</text><text x="16.8" y="142.55" font-style="italic" fill="#565f89">tomato and beef broth. Thick pici pasta is tossed</text><text x="16.8" y="163.55" font-style="italic" fill="#565f89">with the deeply savory sauce, then finished with</text><text x="16.8" y="184.55" font-style="italic" fill="#565f89">fresh parsley and finely grated Parmesan.</text><text x="369.66" y="184.55">[DRAFT]</text><text x="16.8" y="226.55">&#x1F465; </text><text x="42.01" y="226.55" font-weight="bold">4 servings</text><text x="201.63" y="226.55">&#x1F552; Preparation: </text><text x="336.05" y="226.55" font-weight="bold">25 m</text><text x="16.8" y="247.55">&#x1F3C1; Ready in: </text><text x="126.02" y="247.55" font-weight="bold">1h 15m</text><text x="201.63" y="247.55">&#x1F4CA; Complexity: </text><text x="327.65" y="247.55" font-weight="bold">Medium</text><text x="16.8" y="289.55">&#x1F525; </text><text x="42.01" y="289.55" font-weight="bold">875 kCal</text><text x="201.63" y="289.55">&#x1F35E; </text><text x="226.84" y="289.55" font-weight="bold">105g</text><text x="268.84" y="289.55">Carbs</text><text x="16.8" y="310.55">&#x1F951; </text><text x="42.01" y="310.55" font-weight="bold">20g</text><text x="75.61" y="310.55">Fat            &#x1F969; </text><text x="226.84" y="310.55" font-weight="bold">53g</text><text x="260.44" y="310.55">Protein</text><path d="M16.802734375,354.5146875 L117.619140625,354.5146875 Z" stroke="#3b4261"/><text x="16.8" y="352.55" font-weight="bold">Ingredients:</text><text x="33.61" y="394.55" font-weight="bold">&#x1F963; Cheese and garnish</text><text x="50.41" y="415.55">&#x2022; </text><text x="67.21" y="415.55" fill="#7aa2f7">100</text><text x="100.82" y="415.55" fill="#7dcfff">g</text><text x="117.62" y="415.55">Parmesan cheese</text><text x="50.41" y="436.55">&#x2022; </text><text x="67.21" y="436.55" fill="#7aa2f7">30</text><text x="92.42" y="436.55" fill="#7dcfff">g</text><text x="109.22" y="436.55">fresh parsley</text><text x="33.61" y="457.55" font-weight="bold">&#x1F963; Duck rag&#xF9;</text><text x="50.41" y="478.55">&#x2022; </text><text x="67.21" y="478.55" fill="#7aa2f7">180</text><text x="100.82" y="478.55" fill="#7dcfff">g</text><text x="117.62" y="478.55">large onion, unpeeled</text><text x="50.41" y="499.55">&#x2022; </text><text x="67.21" y="499.55" fill="#7aa2f7">180</text><text x="100.82" y="499.55" fill="#7dcfff">g</text><text x="117.62" y="499.55">carrots, unpeeled</text><text x="50.41" y="520.55">&#x2022; </text><text x="67.21" y="520.55" fill="#7aa2f7">120</text><text x="100.82" y="520.55" fill="#7dcfff">g</text><text x="117.62" y="520.55">celery stalks, untrimmed</text><text x="50.41" y="541.55">&#x2022; </text><text x="67.21" y="541.55" fill="#7aa2f7">10</text><text x="92.42" y="541.55" fill="#7dcfff">g</text><text x="109.22" y="541.55">garlic cloves, unpeeled</text><text x="50.41" y="562.55">&#x2022; </text><text x="67.21" y="562.55" fill="#7aa2f7">27</text><text x="92.42" y="562.55" fill="#7dcfff">g</text><text x="109.22" y="562.55">olive oil</text><text x="50.41" y="583.55">&#x2022; </text><text x="67.21" y="583.55" fill="#7aa2f7">500</text><text x="100.82" y="583.55" fill="#7dcfff">g</text><text x="117.62" y="583.55">skinless duck breast</text><text x="50.41" y="604.55">&#x2022; </text><text x="67.21" y="604.55" fill="#7aa2f7">150</text><text x="100.82" y="604.55" fill="#7dcfff">g</text><text x="117.62" y="604.55">dry red wine</text><text x="50.41" y="625.55">&#x2022; </text><text x="67.21" y="625.55" fill="#7aa2f7">400</text><text x="100.82" y="625.55" fill="#7dcfff">g</text><text x="117.62" y="625.55">crushed tomatoes</text><text x="50.41" y="646.55">&#x2022; </text><text x="67.21" y="646.55" fill="#7aa2f7">170</text><text x="100.82" y="646.55" fill="#7dcfff">g</text><text x="117.62" y="646.55">beef broth</text><text x="33.61" y="667.55" font-weight="bold">&#x1F963; Pasta</text><text x="50.41" y="688.55">&#x2022; </text><text x="67.21" y="688.55" fill="#7aa2f7">500</text><text x="100.82" y="688.55" fill="#7dcfff">g</text><text x="117.62" y="688.55">pici pasta or thick spaghetti</text><text x="50.41" y="709.55">&#x2022; </text><text x="67.21" y="709.55" fill="#7aa2f7">2</text><text x="84.01" y="709.55" fill="#7dcfff">tsp</text><text x="117.62" y="709.55">fine sea salt</text><path d="M16.802734375,753.5146875 L67.2109375,753.5146875 Z" stroke="#3b4261"/><text x="16.8" y="751.55" font-weight="bold">Steps:</text><text x="33.61" y="793.55" font-weight="bold" fill="#9ece6a">1. Weigh Parmesan</text><text x="50.41" y="814.55" font-weight="bold" fill="#e0af68">[Scale: 100 g]</text><text x="50.41" y="835.55">Add 100 g Parmesan in chunks to the dry mixing</text><text x="50.41" y="856.55">bowl.</text><text x="33.61" y="898.55" font-weight="bold" fill="#9ece6a">2. Grate Parmesan</text><text x="50.41" y="919.55" font-weight="bold" fill="#e0af68">[Food Processor: 20s]</text><text x="50.41" y="940.55">Process the Parmesan, cut into pieces of approx.</text><text x="50.41" y="961.55">3-4 cm. Transfer to a bowl; scrape down the sides</text><text x="50.41" y="982.55">of the bowl using the spatula.</text><text x="33.61" y="1024.55" font-weight="bold" fill="#9ece6a">3. Add onion</text><text x="50.41" y="1045.55" font-weight="bold" fill="#e0af68">[Scale: 150 g]</text><text x="50.41" y="1066.55">Peel/trim onion (yields approx. 150 g). Add 150 g</text><text x="50.41" y="1087.55">prepared onion to the bowl.</text><text x="33.61" y="1129.55" font-weight="bold" fill="#9ece6a">4. Add carrots</text><text x="50.41" y="1150.55" font-weight="bold" fill="#e0af68">[Scale: 150 g]</text><text x="50.41" y="1171.55">Peel/trim carrots (yields approx. 150 g). Add 150</text><text x="50.41" y="1192.55">g prepared carrots to the bowl.</text><text x="33.61" y="1234.55" font-weight="bold" fill="#9ece6a">5. Add celery</text><text x="50.41" y="1255.55" font-weight="bold" fill="#e0af68">[Scale: 100 g]</text><text x="50.41" y="1276.55">Peel/trim celery (yields approx. 100 g). Add 100 g</text><text x="50.41" y="1297.55">prepared celery to the bowl.</text><line x1="-20" y1="1355.55" x2="520" y2="1355.55" stroke="#3b4261" stroke-width="1" stroke-dasharray="4 4" /><rect x="140" y="1345.55" width="220" height="20" fill="#1a1b26" /><text x="250" y="1359.55" font-family="system-ui, -apple-system, sans-serif" font-style="italic" font-size="12" fill="#565f89" text-anchor="middle" font-weight="normal">(and 18 more cooking steps)</text></g></svg>